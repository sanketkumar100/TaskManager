spring.application.name=team-task-manager

# Database Configuration (with defaults)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3307}/${MYSQLDATABASE:task_manager}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3VyZUpXVFNlY3JldEtleUZvclRhc2tNYW5hZ2VyMjAyNg==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${PORT:8080}